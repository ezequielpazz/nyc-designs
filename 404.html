<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página no encontrada — NYC Designs</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #FAF7F5;
      color: #2B2B2B;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 480px; }
    h1 { font-size: 72px; color: #B8777F; margin-bottom: 8px; }
    h2 { font-size: 22px; margin-bottom: 12px; color: #2B2B2B; }
    p { color: #8A6F6A; margin-bottom: 24px; line-height: 1.6; }
    a {
      display: inline-block;
      background: #B8777F;
      color: #fff;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background .2s;
    }
    a:hover { background: #a0656d; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Página no encontrada</h2>
    <p>La página que buscás no existe o fue movida. Volvé a la tienda para seguir explorando nuestros productos.</p>
    <a href="/">Volver a la tienda</a>
  </div>
</body>
</html>
